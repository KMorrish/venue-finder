<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victoria Licensed Venue Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f4f6;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header .logo {
      width: 32px; height: 32px;
      background: #4f8ef7;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.01em; }
    header p { font-size: 12px; color: #9ca3af; margin-top: 1px; }

    #demo-banner {
      background: #fef3c7;
      border-bottom: 1px solid #fcd34d;
      padding: 7px 20px;
      font-size: 12px;
      color: #92400e;
      text-align: center;
      flex-shrink: 0;
    }

    #toolbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
    }

    #toolbar input, #toolbar select {
      height: 36px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 13px;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    #toolbar input { flex: 1; min-width: 180px; }
    #toolbar select { min-width: 150px; }
    #toolbar input:focus, #toolbar select:focus { border-color: #4f8ef7; }

    #toolbar input::placeholder { color: #9ca3af; }

    #status {
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      padding: 6px 16px;
      font-size: 12px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #status .hint { font-style: italic; }

    #map { flex: 1; }

    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .leaflet-popup-content { margin: 14px 16px; }

    .popup-name {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a2e;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .badge-Gambling { background: #ede9fe; color: #5b21b6; }
    .badge-Liquor   { background: #fee2e2; color: #991b1b; }
    .badge-Both     { background: #d1fae5; color: #065f46; }

    .popup-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 10px;
      font-size: 12px;
    }

    .popup-label { color: #9ca3af; white-space: nowrap; }
    .popup-value { color: #374151; font-weight: 500; }

    .legend {
      background: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      font-size: 12px;
      line-height: 1.9;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1.5px currentColor;
      flex-shrink: 0;
    }

    #clear-btn {
      height: 36px;
      padding: 0 14px;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      white-space: nowrap;
    }

    #clear-btn:hover { background: #e5e7eb; }
  </style>
</head>
<body>

<header>
  <div class="logo">📍</div>
  <div>
    <h1>Victoria Licensed Venue Finder</h1>
    <p>Gambling &amp; Liquor Venues — Inspector Planning Tool</p>
  </div>
</header>

<div id="demo-banner">
  ⚠️ Demo version —
